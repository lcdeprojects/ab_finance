<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle Financeiro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (CDN for simple setup) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                },
                extend: {
                    colors: {
                        primary: '#0ea5e9', // Celeste/light blue 500
                        secondary: '#f0f9ff',
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 h-screen flex flex-col items-center justify-center font-sans antialiased selection:bg-primary selection:text-white transition-colors duration-300">
    
    <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-10 border border-slate-100 dark:border-slate-700 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -right-16 -top-16 w-40 h-40 bg-primary/10 dark:bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute -left-16 -bottom-16 w-40 h-40 bg-teal-500/10 dark:bg-teal-500/5 rounded-full blur-3xl"></div>
        
        <div class="mb-10 text-center relative z-10">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">AB<span class="text-primary">FINANCE</span></h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Insira suas credenciais para gerenciar.</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded-lg text-sm mb-6 font-medium text-center border border-red-100 dark:border-red-800">
            Usuário ou senha incorretos. Tente novamente.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="relative z-10 space-y-6">
            {% csrf_token %}
            <div>
                <label for="id_username" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Usuário</label>
                <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none">
            </div>
            
            <div>
                <label for="id_password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Senha</label>
                <input type="password" name="password" autocomplete="current-password" required id="id_password" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none">
            </div>
            
            <button type="submit" class="w-full bg-primary text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-primary/30 hover:bg-sky-600 hover:shadow-primary/40 focus:ring-4 focus:ring-primary/20 transition-all active:scale-[0.98]">
                Acessar Painel
            </button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
    
    <p class="mt-8 text-xs text-slate-400 dark:text-slate-600">
        &copy; {% now "Y" %} Controle Financeiro
    </p>

</body>
</html>
