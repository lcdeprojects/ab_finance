<div class="mb-6 bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700/50">
    <form method="get" action="{{ action_url }}" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
        <!-- Search by Name -->
        <div class="md:col-span-2">
            <label class="block text-xs font-bold text-gray-500 dark:text-slate-400 uppercase tracking-wider mb-2">Buscar por Nome</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" name="name" value="{{ name_query|default:'' }}" placeholder="Nome do cliente..." class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
            </div>
        </div>

        <!-- Status Filter (Optional) -->
        {% if show_status %}
        <div>
            <label class="block text-xs font-bold text-gray-500 dark:text-slate-400 uppercase tracking-wider mb-2">Status</label>
            <select name="status" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all cursor-pointer">
                <option value="">Todos os Status</option>
                <option value="overdue" {% if status_filter == 'overdue' %}selected{% endif %}>Vencidos</option>
                <option value="scheduled" {% if status_filter == 'scheduled' %}selected{% endif %}>A Vencer</option>
            </select>
        </div>
        {% else %}
        <div></div> <!-- Spacer -->
        {% endif %}

        <!-- Date Filter (Month) -->
        <div>
            <label class="block text-xs font-bold text-gray-500 dark:text-slate-400 uppercase tracking-wider mb-2">Referência</label>
            <div class="flex gap-2">
                <select name="month" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all cursor-pointer">
                    <option value="">Mês</option>
                    {% for num, name in months.items %}
                        <option value="{{ num }}" {% if num == selected_month %}selected{% endif %}>{{ name|slice:":3" }}</option>
                    {% endfor %}
                </select>
                <select name="year" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all cursor-pointer text-xs">
                    <option value="">Ano</option>
                    <option value="2025" {% if selected_year == 2025 %}selected{% endif %}>2025</option>
                    <option value="2026" {% if selected_year == 2026 %}selected{% endif %}>2026</option>
                </select>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-2">
            <button type="submit" class="flex-1 bg-primary hover:bg-primary/80 text-white font-bold py-2.5 rounded-xl transition-all shadow-lg shadow-primary/20 active:scale-95 text-sm">
                Filtrar
            </button>
            {% if export_source %}
            <button type="button" 
                    onclick="const form = this.form; const params = new URLSearchParams(new FormData(form)); params.append('source', '{{ export_source }}'); window.location.href = '{% url 'export_payments_excel' %}?' + params.toString();"
                    class="bg-green-600 hover:bg-green-700 text-white p-2.5 rounded-xl transition-all shadow-lg shadow-green-600/20 active:scale-95 flex items-center justify-center" 
                    title="Exportar para Excel">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </button>
            {% endif %}
            <a href="{{ action_url }}" class="p-2.5 bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-slate-300 rounded-xl hover:bg-gray-200 dark:hover:bg-slate-600 transition-all" title="Limpar Filtros">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </a>
        </div>
    </form>
</div>
